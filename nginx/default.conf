server {
listen 80;
server_name vantage-point.ddnsfree.com; 
location /.well-known/acme-challenge/ {
root /var/www/certbot;
}
location / {
return 301 https://$host$request_uri;
}
} 
🎯 2. The Main HTTPS App
server {
listen 443 ssl;
server_name vantage-point.ddnsfree.com; 
# SSL Certificates (Ensure these paths match your Certbot volumes)
ssl_certificate /etc/letsencrypt/live/vantage-point.ddnsfree.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/vantage-point.ddnsfree.com/privkey.pem;
# 🚀 FIX 1: Client-Side Routing (React Router)
# This prevents 404s when refreshing pages like /dashboard or /lab
location / {
root /usr/share/nginx/html;
index index.html;
try_files 
uri/ /index.html;
} 
